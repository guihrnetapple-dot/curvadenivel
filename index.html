<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c1117" />
    <link rel="icon" type="image/png" href="/logo-curva-nivel.png" />
    <meta
      name="description"
      content="GeoCampo: plataforma empresarial para consulta altimétrica, análise topográfica e perfil de elevação no agronegócio."
    />
    <title>GeoCampo</title>
    <style>
      html,
      body,
      #root {
        min-height: 100vh;
        margin: 0;
        background: #0c1117;
        color: #eef4ef;
        font-family: "customFont", "customFont Fallback", Circular, custom-font, "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .fallback-react {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at 18% 0%, rgba(47, 159, 117, 0.18), transparent 28rem),
          linear-gradient(145deg, rgba(106, 166, 184, 0.11), transparent 42%),
          #0c1117;
      }

      .fallback-react__painel {
        width: min(420px, 100%);
        padding: 22px;
        border: 1px solid rgba(143, 216, 178, 0.22);
        border-radius: 14px;
        background: #111a22;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      .fallback-react strong,
      .fallback-react span {
        display: block;
      }

      .fallback-react strong {
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .fallback-react span {
        color: #aebdb5;
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .fallback-react button {
        width: 100%;
        margin-top: 18px;
        border: 0;
        border-radius: 8px;
        padding: 12px 14px;
        background: #33aa7a;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .fallback-react__detalhe {
        margin-top: 10px;
        color: #7f9088;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-react" role="status" aria-live="polite">
        <section class="fallback-react__painel">
          <strong>Carregando GeoCampo</strong>
          <span>Preparando a tela inicial do aplicativo.</span>
        </section>
      </main>
    </div>
    <script>
      window.addEventListener("error", function (evento) {
        console.error("Falha ao iniciar o GeoCampo:", evento.error || evento.message);
      });
      window.addEventListener("unhandledrejection", function (evento) {
        console.error("Promessa rejeitada ao iniciar o GeoCampo:", evento.reason);
      });

      window.setTimeout(function () {
        var fallback = document.querySelector(".fallback-react");
        if (!fallback) {
          return;
        }

        var painel = fallback.querySelector(".fallback-react__painel");
        if (!painel) {
          return;
        }

        painel.innerHTML =
          "<strong>Não foi possível iniciar o aplicativo.</strong>" +
          "<span>Recarregue a página. Se continuar acontecendo, limpe o cache do navegador e tente novamente.</span>" +
          "<button type=\"button\">Recarregar</button>" +
          "<span class=\"fallback-react__detalhe\">Os detalhes técnicos foram registrados no console do navegador.</span>";

        var botao = painel.querySelector("button");
        if (botao) {
          botao.addEventListener("click", function () {
            window.location.reload();
          });
        }
      }, 15000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
